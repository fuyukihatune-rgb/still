<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Breathing session (full screen) ── */

  .tool-card:active { transform: translateY(1px); border-color: var(--text-4); }
  .tool-emoji { font-size: 30px; width: 52px; height: 52px; border-radius: 14px; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .tool-body { flex: 1; min-width: 0; }
  .tool-name { font-size: 16px; font-weight: 800; }

  .tool-arrow { color: var(--text-4); font-size: 18px; }
  .back-link { display: inline-flex; align-items: center; gap: 4px; background: none; border: none; color: var(--text-3); font-size: 13px; cursor: pointer; padding: 4px 0; margin-bottom: 8px; }

  /* ── Grounding ── */
  .ground-ind { display: flex; gap: 8px; margin-bottom: 4px; }
  .gind { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text-4); }
  .gind.done { background: var(--accent-strong); border-color: var(--accent-strong); color: #fff; }
  .gind.current { border-color: var(--accent-strong); color: var(--accent-strong); }
  .ground-stage { width: 220px; height: 220px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border);
    box-shadow: 0 14px 40px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
    display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; user-select: none; -webkit-user-select: none; transition: transform 0.12s; }
  .ground-stage:active { transform: scale(0.97); }
  .ground-emoji { font-size: 30px; }
  .ground-num { font-size: 56px; font-weight: 800; line-height: 1.1; margin-top: 2px; }
  .ground-num.check { font-size: 44px; color: var(--accent-strong); }
  .ground-sense { font-size: 15px; font-weight: 700; margin-top: 24px; }

  /* ── Terms / Help (reading screen) ── */
  .read-root { max-width: 560px; margin: 0 auto; padding: calc(30px + var(--safe-top)) 18px calc(40px + var(--safe-bottom)); }
  .read-head { text-align: center; margin-bottom: 18px; }
  .read-logo { font-size: 24px; font-weight: 800; letter-spacing: 0.02em; }

  .read-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 22px 22px 20px; box-shadow: var(--shadow); }

  .read-sub { font-size: 13px; color: var(--text-3); margin-top: 4px; margin-bottom: 6px; }
  .read-scroll { max-height: 56vh; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-right: 4px; }
  .read-h { font-size: 13px; font-weight: 800; color: var(--text); margin-top: 18px; margin-bottom: 6px; }
  .read-p { font-size: 13.5px; color: var(--text-2); line-height: 1.85; }
  .read-list { font-size: 13.5px; color: var(--text-2); line-height: 1.85; padding-left: 20px; }
  .read-list li { margin-bottom: 6px; }
  .read-list strong, .read-p strong { color: var(--text); font-weight: 700; }
  .read-note { text-align: center; font-size: 11px; color: var(--text-4); margin-top: 16px; }

  /* ── Settings ── */
  .settings-section { }
  .settings-label { font-size: 13px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
  .settings-desc { font-size: 12.5px; color: var(--text-3); line-height: 1.7; margin-bottom: 12px; }

  .stat-row:first-of-type { border-top: none; }
  .stat-row-label { color: var(--text-3); }

  .dev-msg { font-size: 13px; color: var(--text-2); line-height: 1.8; }
  .dev-links { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
  .dev-link { font-size: 13px; color: var(--accent-strong); text-decoration: none; border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; transition: background 0.15s; }
  .dev-link:active { background: var(--accent-soft); }
  .donate-block { margin-top: 12px; }
  .donate-label { font-size: 12.5px; font-weight: 700; margin-bottom: 6px; }
  .eth-box { background: #fafafa; border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; font-size: 12px; font-family: ui-monospace, "SF Mono", Menlo, monospace; word-break: break-all; line-height: 1.6; color: var(--text-2); margin-bottom: 10px; }
  .link-a { display: block; text-align: center; text-decoration: none; }

  /* ── Install ── */
  .install-section { background: linear-gradient(135deg, #2a2a2e, #1a1a1a); border-radius: 16px; padding: 18px 20px; margin-bottom: 14px; color: #fff; }
  .install-title { font-size: 14px; font-weight: 800; margin-bottom: 6px; }
  .install-desc { font-size: 12.5px; color: rgba(255,255,255,0.75); line-height: 1.7; margin-bottom: 12px; }
  .install-big-btn { width: 100%; background: #fff; color: #1a1a1a; border: none; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .install-steps { display: flex; flex-direction: column; gap: 8px; }
  .install-step { display: flex; gap: 10px; align-items: flex-start; }
  .install-step-num { width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.18); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .install-step-text { font-size: 12.5px; color: rgba(255,255,255,0.85); line-height: 1.6; }
  .install-step-text strong { color: #fff; }

  .app-foot { text-align: center; margin-top: 24px; color: var(--text-4); font-size: 11px; line-height: 1.9; }

  /* ── Toast ── */
  .toast { position: fixed; left: 50%; bottom: calc(28px + var(--safe-bottom)); transform: translateX(-50%) translateY(20px); background: #1a1a1a; color: #fff; font-size: 13px; padding: 11px 20px; border-radius: 999px; opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s; z-index: 90; box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 360px) {
    .orb-stage, .orb-ring { width: 240px; height: 240px; }

  }
  @media (prefers-reduced-motion: reduce) {
    .orb { transition-timing-function: ease; }
  }

  /* キーボードアクセシビリティ */
  :focus-visible { outline: 2px solid currentColor; outline-offset: 3px; border-radius: 4px; }
  button:focus-visible, a:focus-visible, [tabindex]:focus-visible { outline: 2px solid currentColor; outline-offset: 3px; }

<script>
"use strict";

// ── Constants ─────────────────────────────────────────────────────────────────
const STORAGE_KEY  = 'still_v1';
const APP_VERSION  = '1.1.0';
const VERSION_KEY  = 'still_version';
const TERMS_VERSION = 1;

const WHATS_NEW = [
  "きろくをファイルに書き出して保存・復元できる「バックアップ」を追加しました（設定）",
  "Still をリリースしました。呼吸ガイドと 5-4-3-2-1 グラウンディングで、今ここにそっと戻る時間にどうぞ。",
];

const DEV_INFO = {
  name: "田中志（たなかしるす）",
  message: "Ataraxia Works という名前で、心にそっと寄り添う小さな道具をつくっています。感想や要望があればうれしいです。",
  links: [{ label: "X（Twitter）", url: "https://x.com/Sirusu_Tanaka" }],
};

const DONATIONS = [
  { key: "btc", label: "ビットコイン（BTC）", address: "1EHshWSHyvJFjkAYQ5rPX7nKo2FRKWF58f" },
  { key: "eth", label: "イーサリアム（ETH）", address: "0xb7da6af09c0f8db95d0c0e352e32d1915483931e" },
];

// グラウンディング（5-4-3-2-1 の感覚に意識を向ける）
const GROUND_STEPS = [
  { n: 5, emoji: '👀', sense: '見えるもの', hint: 'まわりをゆっくり見回して、目に入るものを5つ。色や形に気づくだけで大丈夫。' },
  { n: 4, emoji: '👂', sense: '聞こえる音', hint: '耳をすませて、聞こえてくる音を4つ。遠くの音でも、自分の呼吸でも。' },
  { n: 3, emoji: '✋', sense: '触れているもの', hint: '体が触れているものを3つ。手ざわりや、温度を感じてみて。' },
  { n: 2, emoji: '👃', sense: 'におい', hint: 'においを2つ。なければ、好きなにおいを思い出すだけでもいい。' },
  { n: 1, emoji: '🫗', sense: '味', hint: '今の口の中の味を1つ。お茶や水をひとくち飲んでもいいですね。' },
];

// 呼吸パターン。phases = [表示名, 秒数, 種類('in'|'out'|'hold')]
const PATTERNS = [
  { key: 'nagomi',   name: 'なごみ',   sub: '4-7-8 ／ 深いリラックス・眠る前に', phases: [['吸う', 4, 'in'], ['止める', 7, 'hold'], ['吐く', 8, 'out']] },
  { key: 'box',      name: 'ボックス', sub: '4-4-4-4 ／ 集中と平常心',          phases: [['吸う', 4, 'in'], ['止める', 4, 'hold'], ['吐く', 4, 'out'], ['止める', 4, 'hold']] },
  { key: 'sazanami', name: 'さざなみ', sub: '5-5 ／ 呼吸をなめらかに整える',     phases: [['吸う', 5, 'in'], ['吐く', 5, 'out']] },
  { key: 'yuttari',  name: 'ゆったり', sub: '4-6 ／ シンプルに落ち着く',         phases: [['吸う', 4, 'in'], ['吐く', 6, 'out']] },
];

// ── State ──────────────────────────────────────────────────────────────────────
let state = {
  agreedTermsVersion: 0,
  sessions: [],                                   // { date, pattern, cycles }
  settings: { pattern: 'nagomi', cycles: 6 },
};

let showSettings  = false;
let showTermsView = false;
let showHelpView  = false;
let updateInfo    = null;
let screen        = 'menu'; // ホームの表示：'menu' | 'breath'
let sess          = null;   // 実行中の呼吸セッション
let ground        = null;   // 実行中のグラウンディング

// ── Persistence ──────────────────────────────────────────────────────────────
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s && typeof s === 'object') {
      state = Object.assign({}, state, s);
      state.settings = Object.assign({ pattern: 'nagomi', cycles: 6 }, s.settings || {});
      if (!Array.isArray(state.sessions)) state.sessions = [];
    }
  } catch {}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

// ── Utilities ────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 2000);
}
function getPattern(key) { return PATTERNS.find(p => p.key === key) || PATTERNS[0]; }
function todayKey() { const d = new Date(); return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate(); }
function sameDay(iso) { try { const d = new Date(iso); return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate() === todayKey(); } catch { return false; } }
function todaysSessions() { return state.sessions.filter(s => sameDay(s.date)).length; }
function countToday(type) { return state.sessions.filter(s => sameDay(s.date) && (s.type || 'breath') === type).length; }
function countAll(type) { return state.sessions.filter(s => (s.type || 'breath') === type).length; }

function isInStandaloneMode() {
  return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
}
function isIOS() {
  return /iphone|ipad|ipod/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

// ── Version notice ─────────────────────────────────────────────────────────────
function checkVersion() {
  let prev = null;
  try { prev = localStorage.getItem(VERSION_KEY); } catch {}
  if (prev && prev !== APP_VERSION) {
    updateInfo = { from: prev, to: APP_VERSION };
  }
  // 更新案内を出すときは、ユーザーが「続ける」を押すまでバージョンを記録しない
  if (!updateInfo) {
    try { localStorage.setItem(VERSION_KEY, APP_VERSION); } catch {}
  }
}

// ── Render ─────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');

  if ((state.agreedTermsVersion || 0) < TERMS_VERSION) { app.innerHTML = renderTerms(false); return; }
  if (showTermsView) { app.innerHTML = renderTerms(true); return; }
  if (showHelpView)  { app.innerHTML = renderHelp(); return; }
  if (updateInfo)    { app.innerHTML = renderUpdateScreen(); return; }
  if (showSettings)  { app.innerHTML = renderShell(renderSettings()); return; }

  app.innerHTML = renderShell(renderHome());
  bindHome();
}

function selectPattern(key) {

}
function changeCycles(d) {

// ── Breathing session ──────────────────────────────────────────────────────────
function startSession() {
  const pat = getPattern(state.settings.pattern);
  sess = { pat: pat, total: state.settings.cycles, cycle: 0, phase: 0, lastScale: 0.5, running: true, timer: null, tick: null, done: false };
  document.getElementById('app').innerHTML = renderSession();
  // 描画後に開始
  requestAnimationFrame(function() { requestAnimationFrame(runPhase); });
}

function renderSession() {
  const dots = [];
  for (let i = 0; i < sess.total; i++) dots.push('<div class="pdot" id="pdot-' + i + '"></div>');
  return '<div class="breath-root">'
    + '<div class="breath-top"><span class="breath-pat">' + escHtml(sess.pat.name) + '</span></div>'
    + '<button class="breath-close" onclick="stopSession()">やめる</button>'
    + '<div class="orb-stage"><div class="orb-ring"></div>'
    + '<div class="orb" id="orb"><div class="orb-phase" id="orb-phase">準備</div><div class="orb-count" id="orb-count"></div></div>'
    + '</div>'
    + '<div class="progress-dots">' + dots.join('') + '</div>'
    + '<div class="breath-hint" id="breath-hint">ガイドの大きさに合わせて、ゆっくり。</div>'
    + '</div>';
}

function runPhase() {
  if (!sess || !sess.running) return;
  const phases = sess.pat.phases;

  // 1サイクル終わったら次のサイクルへ
  if (sess.phase >= phases.length) {
    sess.phase = 0;
    sess.cycle++;
    if (sess.cycle >= sess.total) { finishSession(); return; }
  }
  updateDots();

  const ph = phases[sess.phase];
  const name = ph[0], dur = ph[1], type = ph[2];

  const orb = document.getElementById('orb');
  const phaseEl = document.getElementById('orb-phase');
  const countEl = document.getElementById('orb-count');
  const hintEl = document.getElementById('breath-hint');
  if (!orb) return;

  let scale = sess.lastScale;
  if (type === 'in') scale = 1;
  else if (type === 'out') scale = 0.5;
  sess.lastScale = scale;

  orb.style.transitionDuration = dur + 's';
  orb.style.transform = 'scale(' + scale + ')';
  if (phaseEl) phaseEl.textContent = name;
  if (hintEl) hintEl.textContent = (sess.cycle + 1) + ' / ' + sess.total + ' 呼吸目';

  // 残り秒のカウントダウン（控えめに）
  let remain = dur;
  if (countEl) countEl.textContent = remain;
  clearInterval(sess.tick);
  sess.tick = setInterval(function() {
    remain--;
    if (countEl && remain > 0) countEl.textContent = remain;
    else if (countEl) countEl.textContent = '';
  }, 1000);

  clearTimeout(sess.timer);
  sess.timer = setTimeout(function() {
    clearInterval(sess.tick);
    sess.phase++;
    runPhase();
  }, dur * 1000);
}

function updateDots() {
  for (let i = 0; i < sess.total; i++) {
    const d = document.getElementById('pdot-' + i);
    if (!d) continue;
    d.className = 'pdot' + (i < sess.cycle ? ' done' : (i === sess.cycle ? ' current' : ''));
  }
}

function clearSessionTimers() {
  if (sess) { clearTimeout(sess.timer); clearInterval(sess.tick); }
}

function stopSession() {
  clearSessionTimers();
  if (sess) sess.running = false;
  sess = null;
  screen = 'menu';
  render();
}

function finishSession() {
  clearSessionTimers();
  const done = sess;
  if (sess) sess.running = false;
  // 記録
  state.sessions.push({ date: new Date().toISOString(), type: 'breath', pattern: done.pat.key, cycles: done.total });
  if (state.sessions.length > 500) state.sessions = state.sessions.slice(-500);
  saveState();
  document.getElementById('app').innerHTML = renderDone(done);
  sess = null;
}

function startGround() {
  ground = { stage: 'intro', step: 0, taps: 0 };
  document.getElementById('app').innerHTML = renderGround();
}
function beginGroundSteps() {
  ground.stage = 'step'; ground.step = 0; ground.taps = 0;
  document.getElementById('app').innerHTML = renderGround();
}
function renderGround() {
  if (ground.stage === 'intro') {
    return '<div class="breath-root">'
      + '<button class="breath-close" onclick="stopGround()">やめる</button>'
      + '<div style="max-width:340px;width:100%;display:flex;flex-direction:column;align-items:center">'
      + '<div class="done-emoji">🌿</div>'
      + '<div class="ground-intro-title">グラウンディング</div>'
      + '<div class="ground-intro-p">あわてなくて大丈夫。<br>五感をひとつずつたどって、「今ここ」にゆっくり戻ります。<br>見つけるだけで大丈夫。正解はありません。</div>'
      + '<div class="done-btns">'
      + '<button class="btn-primary" onclick="beginGroundSteps()">はじめる</button>'
      + '<button class="btn-secondary" style="width:100%" onclick="stopGround()">とじる</button>'
      + '</div></div></div>';
  }
  const st = GROUND_STEPS[ground.step];
  const ind = GROUND_STEPS.map(function(s, i) {
    return '<div class="gind' + (i < ground.step ? ' done' : (i === ground.step ? ' current' : '')) + '">' + s.n + '</div>';
  }).join('');
  const dots = [];
  for (let i = 0; i < st.n; i++) dots.push('<div class="pdot" id="gd-' + i + '"></div>');
  const remain = st.n - ground.taps;
  return '<div class="breath-root">'
    + '<button class="breath-close" onclick="stopGround()">やめる</button>'
    + '<div class="ground-ind">' + ind + '</div>'
    + '<div class="ground-stage" onclick="tapGround()">'
    + '<div class="ground-emoji">' + st.emoji + '</div>'
    + '<div class="ground-num' + (remain <= 0 ? ' check' : '') + '" id="ground-num">' + (remain <= 0 ? '✓' : remain) + '</div>'
    + '</div>'
    + '<div class="ground-sense">' + st.n + 'つ、' + escHtml(st.sense) + '</div>'
    + '<div class="progress-dots" style="margin-top:14px">' + dots.join('') + '</div>'
    + '<div class="ground-hint">' + escHtml(st.hint) + '</div>'
    + '<div class="ground-tap" id="ground-tap">' + (remain > 0 ? 'タップで数えられます（しなくてもOK）' : 'いいですね。次へどうぞ。') + '</div>'
    + '<div class="done-btns" style="margin-top:18px">'
    + '<button class="btn-primary" id="ground-next" onclick="nextGroundStep()">' + (ground.taps >= st.n ? '次へ →' : 'これで次へ') + '</button>'
    + '</div></div>';
}
function tapGround() {
  if (!ground || ground.stage !== 'step') return;
  const st = GROUND_STEPS[ground.step];
  if (ground.taps < st.n) ground.taps++;
  const remain = st.n - ground.taps;
  const numEl = document.getElementById('ground-num');
  if (numEl) {
    if (remain <= 0) { numEl.textContent = '✓'; numEl.className = 'ground-num check'; }
    else { numEl.textContent = remain; numEl.className = 'ground-num'; }
  }
  for (let i = 0; i < st.n; i++) { const d = document.getElementById('gd-' + i); if (d) d.className = 'pdot' + (i < ground.taps ? ' done' : ''); }
  const nextBtn = document.getElementById('ground-next');
  if (nextBtn) nextBtn.textContent = ground.taps >= st.n ? '次へ →' : 'これで次へ';
  const tapEl = document.getElementById('ground-tap');
  if (tapEl) tapEl.textContent = remain > 0 ? 'タップで数えられます（しなくてもOK）' : 'いいですね。次へどうぞ。';
}
function nextGroundStep() {
  if (!ground) return;
  ground.step++; ground.taps = 0;
  if (ground.step >= GROUND_STEPS.length) { finishGround(); return; }
  document.getElementById('app').innerHTML = renderGround();
}
function stopGround() {
  ground = null; screen = 'menu'; render();
}
function finishGround() {
  state.sessions.push({ date: new Date().toISOString(), type: 'ground' });
  if (state.sessions.length > 500) state.sessions = state.sessions.slice(-500);
  saveState();
  ground = null;
  document.getElementById('app').innerHTML = renderGroundDone();
}
function renderGroundDone() {
  const n = countToday('ground');
  return '<div class="breath-root"><div style="max-width:320px;width:100%;display:flex;flex-direction:column;align-items:center">'
    + '<div class="done-emoji">🌿</div>'
    + '<div class="done-title">おかえりなさい</div>'
    + '<div class="done-sub">よくここまで戻ってきました。<br>いま、あなたはここにいます。大丈夫。'
    + (n > 1 ? '<br>今日はこれで <b>' + n + '</b> 回目です。' : '') + '</div>'

    + '<button class="btn-secondary" style="width:100%" onclick="backToMenu()">とじる</button>'

}

function exportBackup() {
  try {
    var data = {};
    for (var i = 0; i < localStorage.length; i++) { var k = localStorage.key(i); data[k] = localStorage.getItem(k); }
    var payload = { app: 'still', type: 'backup', version: APP_VERSION, exportedAt: new Date().toISOString(), data: data };
    var blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var dt = new Date(); var stamp = '' + dt.getFullYear() + String(dt.getMonth()+1).padStart(2,'0') + String(dt.getDate()).padStart(2,'0');
    var a = document.createElement('a'); a.href = url; a.download = 'still-backup-' + stamp + '.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
    showToast('バックアップを書き出しました');
  } catch (e) { showToast('書き出しに失敗しました'); }
}
function onBackupFilePick(ev) {
  var file = (ev.target.files || [])[0]; ev.target.value = ''; if (!file) return;
  var reader = new FileReader();
  reader.onload = function() {
    var payload; try { payload = JSON.parse(reader.result); } catch (e) { showToast('このファイルは読み込めませんでした'); return; }
    if (!payload || payload.app !== 'still' || !payload.data) { showToast('Stillのバックアップファイルではありません'); return; }
    if (!confirm('バックアップから復元します。今のデータはファイルの内容に置きかわります。続けますか？')) return;
    try { Object.keys(payload.data).forEach(function(k){ localStorage.setItem(k, payload.data[k]); }); }
    catch (e) { showToast('復元に失敗しました'); return; }
    showToast('復元しました');
    setTimeout(function(){ location.reload(); }, 600);
  };
  reader.onerror = function() { showToast('読み込みに失敗しました'); };
  reader.readAsText(file);
}

        + '<div class="install-step"><div class="install-step-num">2</div><div class="install-step-text"><strong>「ホーム画面に追加」</strong> を選択</div></div>'

  return '<div class="section-title" style="margin-bottom:16px">設定・このアプリについて</div>'

    + '<div class="card settings-section">'

    + '<div class="settings-desc">呼吸ガイドの見かたを、やさしく説明します。</div>'
    + '<button class="btn-secondary" style="width:100%" onclick="openHelp()">使い方を見る</button>'
    + '</div>'
    + '<div class="card settings-section">'
    + '<div class="settings-label">きろく</div>'
    + '<div class="stat-row"><span class="stat-row-label">今日の呼吸</span><span class="stat-row-val">' + countToday('breath') + ' 回</span></div>'
    + '<div class="stat-row"><span class="stat-row-label">今日のグラウンディング</span><span class="stat-row-val">' + countToday('ground') + ' 回</span></div>'
    + '<div class="stat-row"><span class="stat-row-label">これまでの合計</span><span class="stat-row-val">' + state.sessions.length + ' 回</span></div>'
    + '</div>'
    + '<div class="card settings-section">'
    + '<div class="settings-label">バックアップ（書き出し・復元）</div>'
    + '<div class="settings-desc">きろくをファイルに書き出して保存できます。機種変更や故障に備えて、ときどき書き出しておくと安心です。復元すると、今のデータはファイルの内容に置きかわります。</div>'
    + '<button class="btn-secondary" style="width:100%;margin-bottom:8px" onclick="exportBackup()">バックアップを書き出す</button>'
    + '<label class="btn-secondary" style="display:block;text-align:center;width:100%;cursor:pointer">バックアップから復元<input type="file" accept="application/json,.json" hidden onchange="onBackupFilePick(event)" /></label>'
    + '</div>'
    + '<div class="card settings-section">'
    + '<div class="settings-label">プライバシーと注意</div>'
    + '<div class="settings-desc">最初に表示した内容をもう一度読めます。</div>'
    + '<button class="btn-secondary" style="width:100%" onclick="viewTerms()">プライバシーと注意を読む</button>'
    + '</div>'
    + '<div class="card settings-section">'
    + '<div class="settings-label">開発者情報</div>'
    + '<div class="dev-msg">' + escHtml(DEV_INFO.name) + '<br>' + escHtml(DEV_INFO.message) + '</div>'
    + (DEV_INFO.links && DEV_INFO.links.length
        ? '<div class="dev-links">' + DEV_INFO.links.map(function(l) { return '<a class="dev-link" href="' + escHtml(l.url) + '" target="_blank" rel="noopener noreferrer">🔗 ' + escHtml(l.label) + '</a>'; }).join('') + '</div>'
        : '')
    + '</div>'

    + '<div class="app-foot">Still v' + escHtml(APP_VERSION) + '<br>Ataraxia Works · 心の平静に寄り添う道具<br>© 田中志 / Ataraxia Works</div>';

function copyAddress(text) {
  const done = function() { showToast('アドレスをコピーしました'); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(function() { fallbackCopy(text, done); });
  } else { fallbackCopy(text, done); }
}
function fallbackCopy(text, done) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    done();
  } catch { showToast('コピーできませんでした'); }
}

// ── PWA install / update ────────────────────────────────────────────────────────
let deferredPrompt = null;
async function triggerInstall() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    try { await deferredPrompt.userChoice; } catch {}
    deferredPrompt = null;
    if (showSettings) render();
    return;
  }
  showToast(isIOS() ? 'Safariの共有ボタンから「ホーム画面に追加」を選んでください' : 'ブラウザのメニューから「ホーム画面に追加」を選んでください');
}
async function forceUpdate() {
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(function(r) { return r.unregister(); }));
    }
    if (window.caches && caches.keys) {
      const keys = await caches.keys();
      await Promise.all(keys.map(function(k) { return caches.delete(k); }));
    }
  } catch {}
  window.location.reload();
}

window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  if (showSettings) render();
});

// セッション中にタブを離れたら、その呼吸を一時停止 → 戻ったら今の呼吸をやり直す
document.addEventListener('visibilitychange', function() {
  if (!sess || !sess.running) return;
  if (document.hidden) {
    clearSessionTimers();
  } else {
    runPhase();
  }
});

// ── Boot ────────────────────────────────────────────────────────────────────────
loadState();
checkVersion();
render();

// ── Service Worker ───────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  var hadController = !!navigator.serviceWorker.controller;
  var reloading = false;
  navigator.serviceWorker.addEventListener('controllerchange', function() {
    if (!hadController || reloading) return;
    reloading = true;
    window.location.reload();
  });
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').then(function(reg) {
      reg.update().catch(function() {});
      reg.addEventListener('updatefound', function() {
        var nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', function() {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            nw.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
    }).catch(function() {});
  });
}
